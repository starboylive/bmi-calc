<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <main class="main-box">

        <h1 class="bmi-heading">BMI <span id="res">Calculator</span></h1>
        <ul class="vals">
            <li><input id="weight" type="number" placeholder="Enter Weight " required></li>
            <li><input id="height" type="number" placeholder="Enter Height" required></li>
            <li><input id="submit" type="submit" value="Calculate" onclick="bmiCalc()"></li>
        </ul>

        <h2 id="results">Results: </h2>

    </main>




    <script src="index.js"></script>
</body>

</html>
